<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <script>
    (function applySavedTheme() {
      const theme = localStorage.getItem('etf_dashboard_theme') || 'system';
      if (theme === 'light' || theme === 'dark') {
        document.documentElement.dataset.theme = theme;
      }
    })();
  </script>
  <style>
    :root {
      --bg: #0b0e13;
      --bg2: #111820;
      --panel: rgba(18, 24, 32, 0.84);
      --panel-strong: rgba(24, 32, 42, 0.94);
      --panel-border: rgba(255,255,255,0.08);
      --row-border: rgba(255,255,255,0.06);
      --surface-soft: rgba(255,255,255,0.035);
      --input-bg: rgba(255,255,255,0.045);
      --input-border: rgba(255,255,255,0.10);
      --option-bg: #18202a;
      --option-checked-bg: #7cd6ff;
      --button-text: #07111f;
      --text: #edf2ff;
      --muted: #95a3ba;
      --accent: #7cd6ff;
      --accent-2: #f0b35a;
      --good: #35d49a;
      --bad: #ff6b81;
      --warn: #ffcc66;
      --shadow: 0 18px 48px rgba(0,0,0,0.28);
      --radius: 12px;
    }
    :root[data-theme="light"] {
      --bg: #f3f6f9;
      --bg2: #ffffff;
      --panel: rgba(255, 255, 255, 0.90);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --panel-border: rgba(22, 32, 46, 0.10);
      --row-border: rgba(22, 32, 46, 0.10);
      --surface-soft: rgba(22, 32, 46, 0.045);
      --input-bg: rgba(255, 255, 255, 0.82);
      --input-border: rgba(22, 32, 46, 0.14);
      --option-bg: #ffffff;
      --option-checked-bg: #d7eefb;
      --button-text: #07111f;
      --text: #18202a;
      --muted: #5f6f82;
      --accent: #0b79a8;
      --accent-2: #c77b1f;
      --good: #087f5b;
      --bad: #c92a46;
      --warn: #a66300;
      --shadow: 0 18px 42px rgba(26, 36, 50, 0.11);
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
    }
    :root[data-theme="light"] {
      color-scheme: light;
    }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme]) {
        --bg: #f3f6f9;
        --bg2: #ffffff;
        --panel: rgba(255, 255, 255, 0.90);
        --panel-strong: rgba(255, 255, 255, 0.96);
        --panel-border: rgba(22, 32, 46, 0.10);
        --row-border: rgba(22, 32, 46, 0.10);
        --surface-soft: rgba(22, 32, 46, 0.045);
        --input-bg: rgba(255, 255, 255, 0.82);
        --input-border: rgba(22, 32, 46, 0.14);
        --option-bg: #ffffff;
        --option-checked-bg: #d7eefb;
        --button-text: #07111f;
        --text: #18202a;
        --muted: #5f6f82;
        --accent: #0b79a8;
        --accent-2: #c77b1f;
        --good: #087f5b;
        --bad: #c92a46;
        --warn: #a66300;
        --shadow: 0 18px 42px rgba(26, 36, 50, 0.11);
        color-scheme: light;
      }
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
      letter-spacing: 0;
    }
    .wrap {
      max-width: 1480px;
      margin: 0 auto;
      padding: 34px 24px 60px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 26px;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 10px;
      font-size: 14px;
      max-width: 760px;
      line-height: 1.7;
    }
    .top-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(124,214,255,0.08);
      color: var(--accent);
      border: 1px solid rgba(124,214,255,0.16);
      font-size: 12px;
      backdrop-filter: blur(14px);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }
    .dashboard-shell {
      display: grid;
      grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .sidebar {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 14px;
    }
    .main-workspace {
      min-width: 0;
    }
    .sidebar-card {
      padding: 16px;
    }
    .sidebar-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }
    .sidebar-list {
      display: grid;
      gap: 10px;
      font-size: 13px;
    }
    .sidebar-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--row-border);
    }
    .sidebar-row:last-child { border-bottom: none; padding-bottom: 0; }
    .sidebar-row span:last-child {
      text-align: right;
      overflow-wrap: anywhere;
    }
    .broker-account {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--panel-border);
      margin-bottom: 10px;
    }
    .settings-form {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .field {
      display: grid;
      gap: 5px;
    }
    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      outline: none;
    }
    select option {
      color: var(--text);
      background: var(--option-bg);
    }
    select option:checked {
      color: var(--button-text);
      background: var(--option-checked-bg);
    }
    .field input:focus,
    .field select:focus {
      border-color: rgba(124,214,255,0.42);
      box-shadow: 0 0 0 3px rgba(124,214,255,0.10);
    }
    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn-primary,
    .btn-secondary {
      padding: 9px 12px;
      border-radius: 8px;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-primary {
      border: none;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: var(--button-text);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.055);
      color: var(--text);
    }
    .theme-toggle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .theme-button {
      padding: 8px 6px;
      border-radius: 8px;
      border: 1px solid var(--panel-border);
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .theme-button.active {
      color: var(--button-text);
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-color: transparent;
    }
    :root[data-theme="light"] [style*="color:#edf2ff"],
    :root[data-theme="light"] [style*="color: #edf2ff"],
    :root[data-theme="light"] [style*="color:#fff"],
    :root[data-theme="light"] [style*="color: #fff"],
    :root[data-theme="light"] [style*="color:rgba(255,255,255"],
    :root[data-theme="light"] [style*="color: rgba(255,255,255"] {
      color: var(--text) !important;
    }
    :root[data-theme="light"] [style*="color:#666"],
    :root[data-theme="light"] [style*="color: #666"],
    :root[data-theme="light"] [style*="color:#888"],
    :root[data-theme="light"] [style*="color: #888"],
    :root[data-theme="light"] [style*="color:#aaa"],
    :root[data-theme="light"] [style*="color: #aaa"],
    :root[data-theme="light"] [style*="color:#ccc"],
    :root[data-theme="light"] [style*="color: #ccc"] {
      color: var(--muted) !important;
    }
    :root[data-theme="light"] [style*="background:rgba(255,255,255"],
    :root[data-theme="light"] [style*="background: rgba(255,255,255"],
    :root[data-theme="light"] [style*="background:rgba(0,0,0"],
    :root[data-theme="light"] [style*="background: rgba(0,0,0"] {
      background: var(--surface-soft) !important;
    }
    :root[data-theme="light"] [style*="border:1px solid rgba(255,255,255"],
    :root[data-theme="light"] [style*="border: 1px solid rgba(255,255,255"] {
      border-color: var(--panel-border) !important;
    }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme]) [style*="color:#edf2ff"],
      :root:not([data-theme]) [style*="color: #edf2ff"],
      :root:not([data-theme]) [style*="color:#fff"],
      :root:not([data-theme]) [style*="color: #fff"],
      :root:not([data-theme]) [style*="color:rgba(255,255,255"],
      :root:not([data-theme]) [style*="color: rgba(255,255,255"] {
        color: var(--text) !important;
      }
      :root:not([data-theme]) [style*="color:#666"],
      :root:not([data-theme]) [style*="color: #666"],
      :root:not([data-theme]) [style*="color:#888"],
      :root:not([data-theme]) [style*="color: #888"],
      :root:not([data-theme]) [style*="color:#aaa"],
      :root:not([data-theme]) [style*="color: #aaa"],
      :root:not([data-theme]) [style*="color:#ccc"],
      :root:not([data-theme]) [style*="color: #ccc"] {
        color: var(--muted) !important;
      }
      :root:not([data-theme]) [style*="background:rgba(255,255,255"],
      :root:not([data-theme]) [style*="background: rgba(255,255,255"],
      :root:not([data-theme]) [style*="background:rgba(0,0,0"],
      :root:not([data-theme]) [style*="background: rgba(0,0,0"] {
        background: var(--surface-soft) !important;
      }
      :root:not([data-theme]) [style*="border:1px solid rgba(255,255,255"],
      :root:not([data-theme]) [style*="border: 1px solid rgba(255,255,255"] {
        border-color: var(--panel-border) !important;
      }
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 22px;
      transition: all 0.3s ease;
    }
    .card-header {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card.collapsed {
      padding-bottom: 12px;
    }
    .card.collapsed .card-content {
      display: none;
    }
    .card.collapsed .card-header {
      margin-bottom: 0;
    }
    .collapse-icon {
      transition: transform 0.3s ease;
      font-size: 10px;
      opacity: 0.5;
    }
    .collapsed .collapse-icon {
      transform: rotate(-90deg);
    }
    /* Tooltip styles */
    .tooltip {
      position: relative;
      display: inline-block;
      cursor: help;
      margin-left: 6px;
      color: var(--accent);
      font-size: 14px;
      vertical-align: middle;
      opacity: 0.7;
    }
    .tooltip:hover { opacity: 1; }
    .tooltip .tooltiptext {
      visibility: hidden;
      width: 240px;
      background-color: var(--panel-strong);
      color: var(--text);
      text-align: left;
      border-radius: 12px;
      padding: 12px;
      position: absolute;
      z-index: 100;
      bottom: 125%;
      left: 50%;
      margin-left: -120px;
      opacity: 0;
      transition: opacity 0.3s;
      border: 1px solid var(--accent);
      box-shadow: var(--shadow);
      font-size: 13px;
      line-height: 1.5;
      font-weight: normal;
      pointer-events: none;
    }
    .tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
    }
    .card-strong {
      background: linear-gradient(180deg, rgba(124,214,255,0.05), rgba(255,255,255,0.01)), var(--panel-strong);
    }
    .kpi { grid-column: span 3; min-height: 150px; }
    .wide { grid-column: span 8; }
    .side { grid-column: span 4; }
    .full { grid-column: span 12; }
    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .value {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }
    .subvalue {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .status-list {
      display: grid;
      gap: 12px;
      margin-top: 6px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
    }
    .status-item:last-child { border-bottom: none; }
    .muted { color: var(--muted); }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
    }
    th, td {
      text-align: left;
      padding: 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    td {
      font-size: 14px;
    }
    .mono {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .status-pill.status-holding {
      background: rgba(53,212,154,0.16);
      color: var(--good);
      border: 1px solid rgba(53,212,154,0.28);
    }
    .status-pill.status-watch {
      background: rgba(124,214,255,0.12);
      color: var(--accent);
      border: 1px solid rgba(124,214,255,0.24);
    }
    .category-pill.category-core {
      color: #9ad8ff;
      border-color: rgba(124,214,255,0.20);
      background: rgba(124,214,255,0.08);
    }
    .category-pill.category-income {
      color: #ffd36e;
      border-color: rgba(255,211,110,0.20);
      background: rgba(255,211,110,0.08);
    }
    .category-pill.category-defensive {
      color: #b7ffa0;
      border-color: rgba(183,255,160,0.20);
      background: rgba(183,255,160,0.08);
    }
    .inline-banner {
      display: none;
      margin: 0 0 16px 0;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .inline-banner.show { display: block; }
    .inline-banner.success {
      background: rgba(53,212,154,0.10);
      color: #baf5dc;
      border-color: rgba(53,212,154,0.22);
    }
    .inline-banner.error {
      background: rgba(255,107,129,0.10);
      color: #ffc0ca;
      border-color: rgba(255,107,129,0.22);
    }
    @media (max-width: 1080px) {
      .dashboard-shell { grid-template-columns: 1fr; }
      .sidebar { position: static; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .kpi { grid-column: span 6; }
      .wide, .side, .full { grid-column: span 12; }
      .hero { flex-direction: column; align-items: flex-start; }
      .top-meta { justify-content: flex-start; }
    }
    @media (max-width: 640px) {
      .sidebar { grid-template-columns: 1fr; }
      .kpi { grid-column: span 12; }
      .wrap { padding: 24px 16px 44px; }
      .title { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
  <script>
    function toggleCard(cardId) {
      const card = document.getElementById(cardId);
      if (card) {
        card.classList.toggle('collapsed');
        // Optional: Save state to localStorage
        localStorage.setItem(`card_collapsed_${cardId}`, card.classList.contains('collapsed'));
      }
    }
    function applyDashboardTheme(theme) {
      const normalized = ['light', 'dark', 'system'].includes(theme) ? theme : 'system';
      localStorage.setItem('etf_dashboard_theme', normalized);
      if (normalized === 'system') {
        delete document.documentElement.dataset.theme;
      } else {
        document.documentElement.dataset.theme = normalized;
      }
      document.querySelectorAll('[data-theme-choice]').forEach(button => {
        button.classList.toggle('active', button.dataset.themeChoice === normalized);
      });
    }
    // Restore collapsed state on load
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.card').forEach(card => {
        if (card.id && localStorage.getItem(`card_collapsed_${card.id}`) === 'true') {
          card.classList.add('collapsed');
        }
      });
      applyDashboardTheme(localStorage.getItem('etf_dashboard_theme') || 'system');
    });
  </script>
</body>
</html>
