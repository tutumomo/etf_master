branding:
  agent_name: "ETF Master"
  welcome: "歡迎回來！ETF Master 已上線，隨時待命。"
  goodbye: "收工！資產安全，明天見 💼"
  response_label: " 💼 ETF Master "
  prompt_symbol: "◈ ❯ "
  help_header: "📊 可用指令"

