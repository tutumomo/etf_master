    - "(💎)"
    - "(📈)"
    - "(🛡)"
    - "(⏳)"
    - "(⚖)"
  thinking_faces:
    - "(📊)"
    - "(🔍)"
    - "(💰)"
    - "(🧮)"
    - "(📐)"
  thinking_verbs:
    - "評估風險"
    - "計算持倉"
    - "掃描市場"
    - "校準策略"
    - "檢視籌碼"
    - "比對估值"
    - "量化情境"
    - "守護資產"
  wings:
    - ["▎◈ ", " ◈▏"]
    - ["▎◆ ", " ◆▏"]
